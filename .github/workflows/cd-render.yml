name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build application
      run: mvn clean package -DskipTests
      timeout-minutes: 20

    - name: Trigger Render deployment
      run: |
        curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    - name: Wait for deployment
      run: |
        echo "Deployment triggered to Render"
        echo "Check https://dashboard.render.com for deployment status"
        echo "Service: mini-marketplace-prod"

    - name: Verify deployment health
      run: |
        MAX_ATTEMPTS=10
        ATTEMPT=1
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mini-marketplace-prod.onrender.com/api/actuator/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Application is healthy!"
            exit 0
          fi
          ATTEMPT=$((ATTEMPT + 1))
          sleep 30
        done
        echo "⚠️ Application health check incomplete (may still be deploying)"
        exit 0

    - name: Deployment summary
      if: always()
      run: |
        echo "=== DEPLOYMENT SUMMARY ===" >> $GITHUB_STEP_SUMMARY
        echo "Service: mini-marketplace-prod" >> $GITHUB_STEP_SUMMARY
        echo "Status: Deployment triggered to Render" >> $GITHUB_STEP_SUMMARY
        echo "Live URL: https://mini-marketplace-prod.onrender.com" >> $GITHUB_STEP_SUMMARY
        echo "Health: https://mini-marketplace-prod.onrender.com/api/actuator/health" >> $GITHUB_STEP_SUMMARY
        echo "Dashboard: https://dashboard.render.com/services/srv-${{ secrets.RENDER_SERVICE_ID }}" >> $GITHUB_STEP_SUMMARY
