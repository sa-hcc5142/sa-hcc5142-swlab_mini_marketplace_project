name: CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Maven clean compile
      run: |
        mvn clean compile \
          -Dmaven.javadoc.skip=true \
          -DskipTests
      timeout-minutes: 15

    - name: Run Maven unit and integration tests
      run: |
        mvn clean verify \
          -Dmaven.javadoc.skip=true
      timeout-minutes: 20

    - name: Generate test reports
      if: always()
      run: |
        mvn surefire-report:report -DskipTests=true
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 30

    - name: Upload surefire report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-report
        path: target/site/
        retention-days: 30

    - name: Publish test results comment
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: 'target/surefire-reports/TEST-*.xml'
        reporter: 'java-junit'
        fail-on-error: false
      continue-on-error: true

    - name: Build summary
      if: always()
      run: |
        echo "=== BUILD SUMMARY ===" >> $GITHUB_STEP_SUMMARY
        echo "Build Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Build failed. Please check logs above." >> $GITHUB_STEP_SUMMARY
        fi
