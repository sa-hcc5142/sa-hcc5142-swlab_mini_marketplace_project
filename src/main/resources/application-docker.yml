spring:
  application:
    name: mini-marketplace

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mini_marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:marketplace_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 45000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
      dialect: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        use-new-id-generator-mappings: true
    open-in-view: false
    show-sql: false
  
  transaction:
    default-timeout: 30

  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

server:
  port: ${SERVER_PORT:8080}
  # Removed global /api prefix for root UI hosting
  tomcat:
    max-threads: 200
    min-spare-threads: 10

logging:
  level:
    root: INFO
    com.marketplace: DEBUG
    org.springframework.security: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
