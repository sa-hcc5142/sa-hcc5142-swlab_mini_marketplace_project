<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Register')}"></div>

<main class="container">
  <div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 class="section-title text-center" style="margin-top:0;">Create Account</h2>
    <p class="text-center text-muted mb-2">Join to buy or sell products.</p>
    
    <form id="registerForm" class="form w-full">
      <input id="regFullName" placeholder="Full Name" required>
      <input id="regEmail" type="email" placeholder="Email Address" required>
      <input id="regPassword" type="password" placeholder="Password" required minlength="4">
      <select id="regRole" required>
        <option value="" disabled selected>Select an Account Type</option>
        <option value="BUYER">BUYER - Shop & Buy</option>
        <option value="SELLER">SELLER - Create Products</option>
        <option value="ADMIN">ADMIN - Manage System</option>
      </select>
      <button class="btn btn-primary w-full" type="submit">Complete Registration</button>
    </form>
    
    <div class="text-center mt-2">
      <p class="kv">Already have an account? <a th:href="@{/login}">Login here</a></p>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/register.js}"></script>
</body>
</html>
