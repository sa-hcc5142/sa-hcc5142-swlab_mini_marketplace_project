<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Seller Dashboard')}"></div>

<main class="container">
  <section sec:authorize="hasAnyRole('SELLER','ADMIN')">
    <h2 class="section-title">Seller Product Management</h2>
    <div class="notice">Use this form to create products via <span class="mono">POST /api/products</span>.</div>

    <section class="card">
      <form id="sellerForm" class="form">
        <input id="name" placeholder="Product name" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <input id="price" type="number" min="0" step="0.01" placeholder="Price" required>
        <input id="stock" type="number" min="0" step="1" placeholder="Stock" required>
        <input id="category" placeholder="Category" required>
        <button class="btn btn-primary" type="submit">Create Product</button>
      </form>
    </section>

    <section class="card">
      <h3>Last API Response</h3>
      <pre id="sellerOutput" class="mono">No request yet.</pre>
    </section>
  </section>

  <section class="card" sec:authorize="!hasAnyRole('SELLER','ADMIN')">
    <h3>Seller Access Restricted</h3>
    <p class="kv">Login as SELLER or ADMIN to use this dashboard.</p>
  </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/seller.js}"></script>
</body>
</html>
