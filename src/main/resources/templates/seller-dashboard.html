<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Seller Dashboard')}"></div>

<main class="container">
  <section sec:authorize="hasAnyRole('SELLER','ADMIN')">
    <div class="flex justify-between items-center mb-2">
      <h2 class="section-title" style="margin:0">Seller Product Management</h2>
    </div>

    <div class="grid" style="grid-template-columns: 1.5fr 2.5fr; align-items: start; gap: 20px;">
      <!-- Create Product Form -->
      <section class="card" style="position: sticky; top: 100px;">
        <h3 id="formTitle" style="margin-top:0;">Create New Product</h3>
        <form id="sellerForm" class="form w-full">
          <input type="hidden" id="productId">
          <input id="name" placeholder="Product name" required>
          <textarea id="description" placeholder="Description" required rows="3"></textarea>
          <div class="flex gap-1" style="margin-bottom:12px;">
            <input id="price" type="number" min="0" step="0.01" placeholder="Price" style="width:100%" required>
            <input id="stock" type="number" min="0" step="1" placeholder="Stock" style="width:100%" required>
          </div>
          <input id="category" placeholder="Category" style="margin-bottom:12px; width:100%; display:block; padding:10px; border-radius:10px; border:1px solid rgba(15, 23, 42, 0.2);" required>
          <button id="submitBtn" class="btn btn-primary w-full" type="submit">Create Product</button>
        </form>
      </section>

      <!-- Managed Products List -->
      <section class="card">
        <h3 style="margin-top:0;">Catalog Overview</h3>
        <p class="text-muted" style="margin-top:-10px; font-size:13px; margin-bottom:15px;">List of all products. Only edit/delete products you own.</p>
        
        <div class="table-wrapper" style="margin:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="sellerProductsList">
              <tr><td colspan="5" class="text-center text-muted">Loading products...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </section>

  <section class="card" sec:authorize="!hasAnyRole('SELLER','ADMIN')">
    <h3>Seller Access Restricted</h3>
    <p class="kv">Login as SELLER or ADMIN to use this dashboard.</p>
  </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/seller.js}"></script>
</body>
</html>
