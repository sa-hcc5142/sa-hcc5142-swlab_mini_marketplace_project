<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Products')}"></div>

<main class="container">
  <div class="flex justify-between items-center mb-2">
    <h2 class="section-title" style="margin:0;">Store Catalog</h2>
  </div>
  <div id="productsList" class="grid"></div>
  <div id="productsError" class="notice" style="display:none"></div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/products.js}"></script>
</body>
</html>
