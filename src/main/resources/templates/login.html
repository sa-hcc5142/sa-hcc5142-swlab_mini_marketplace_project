<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Login')}"></div>

<main class="container">
  <div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 class="section-title text-center" style="margin-top:0;">Welcome Back</h2>
    <p class="text-center text-muted mb-2">Sign in to access your dashboard</p>
    
    <form id="loginForm" class="form w-full">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button class="btn btn-primary w-full" type="submit">Sign In</button>
    </form>
    
    <div class="text-center mt-2">
      <p class="kv">Don't have an account? <a th:href="@{/register}">Register here</a></p>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
