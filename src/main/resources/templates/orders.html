<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Orders')}"></div>

<main class="container">
  <section sec:authorize="hasAnyRole('BUYER','ADMIN')">
    <h2 class="section-title">Order History</h2>
    <p class="kv">Protected endpoint: <span class="mono">GET /api/orders/me?page=0&size=10</span></p>
    <pre id="ordersOutput" class="mono">Loading...</pre>
  </section>
  <section class="card" sec:authorize="!hasAnyRole('BUYER','ADMIN')">
    <h3>Order Access Restricted</h3>
    <p class="kv">Login as BUYER or ADMIN to view order history.</p>
  </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/orders.js}"></script>
</body>
</html>
