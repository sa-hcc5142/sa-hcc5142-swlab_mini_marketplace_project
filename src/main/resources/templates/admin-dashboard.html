<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Admin Dashboard')}"></div>

<main class="container">
  <section sec:authorize="hasRole('ADMIN')">
    <h2 class="section-title">Admin User Management</h2>
    <div class="notice">Loads <span class="mono">GET /api/admin/users?page=0&size=10</span>.</div>
    <section class="card">
      <button id="refreshUsers" class="btn btn-primary" type="button">Refresh Users</button>
      <pre id="adminOutput" class="mono">Click refresh to load users.</pre>
    </section>
  </section>

  <section class="card" sec:authorize="!hasRole('ADMIN')">
    <h3>Admin Access Restricted</h3>
    <p class="kv">Login as ADMIN to use this dashboard.</p>
  </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
