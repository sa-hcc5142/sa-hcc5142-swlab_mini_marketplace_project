<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Mini Marketplace</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Admin Dashboard')}"></div>

<main class="container">
  <section sec:authorize="hasRole('ADMIN')">
    <div class="flex justify-between items-center mb-2">
      <h2 class="section-title" style="margin:0;">User Management</h2>
      <button id="refreshUsers" class="btn btn-ghost">Refresh Users</button>
    </div>

    <div class="card table-wrapper" style="margin-bottom:30px; padding:0;">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Roles</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminUsersList">
          <tr><td colspan="5" class="text-center text-muted" style="padding:20px;">Click refresh to load users...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="flex justify-between items-center mb-2">
      <h2 class="section-title" style="margin:0;">Order Management</h2>
      <button id="refreshOrders" class="btn btn-ghost">Refresh Orders</button>
    </div>

    <div class="card table-wrapper" style="margin:0; padding:0;">
      <table class="data-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Buyer Email</th>
            <th>Total Amount</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminOrdersList">
          <tr><td colspan="5" class="text-center text-muted" style="padding:20px;">Click refresh to load orders...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="card" sec:authorize="!hasRole('ADMIN')">
    <h3 style="color:var(--danger)">Access Denied</h3>
    <p class="kv">This page is restricted to administrators.</p>
  </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
