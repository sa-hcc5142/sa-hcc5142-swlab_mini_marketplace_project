<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #1f2937; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="50" y="55" class="title">Mini Marketplace Architecture Diagram</text>

  <rect class="box" x="70" y="120" width="230" height="120" fill="#dbeafe" stroke="#2563eb"/>
  <text x="95" y="160" class="label">Client Layer</text>
  <text x="95" y="190" class="text">Browser + Thymeleaf UI</text>
  <text x="95" y="212" class="text">Static JS/CSS</text>

  <rect class="box" x="360" y="120" width="270" height="120" fill="#dcfce7" stroke="#16a34a"/>
  <text x="385" y="160" class="label">Security Layer</text>
  <text x="385" y="190" class="text">Spring Security</text>
  <text x="385" y="212" class="text">BCrypt + Role Authorization</text>

  <rect class="box" x="700" y="120" width="280" height="120" fill="#fee2e2" stroke="#dc2626"/>
  <text x="725" y="160" class="label">Controller Layer</text>
  <text x="725" y="190" class="text">Auth, Product, Order, Cart,</text>
  <text x="725" y="212" class="text">Review, Admin, View Controllers</text>

  <rect class="box" x="1030" y="120" width="300" height="120" fill="#fef3c7" stroke="#d97706"/>
  <text x="1055" y="160" class="label">Exception Layer</text>
  <text x="1055" y="190" class="text">GlobalExceptionHandler</text>
  <text x="1055" y="212" class="text">Consistent API Responses</text>

  <rect class="box" x="470" y="330" width="320" height="140" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="495" y="375" class="label">Service Layer</text>
  <text x="495" y="403" class="text">Business rules + transactions</text>
  <text x="495" y="425" class="text">AuthService, ProductService,</text>
  <text x="495" y="447" class="text">OrderService, CartService, ...</text>

  <rect class="box" x="860" y="330" width="300" height="140" fill="#cffafe" stroke="#0891b2"/>
  <text x="885" y="375" class="label">DTO / Mapper Layer</text>
  <text x="885" y="403" class="text">Request/Response DTOs</text>
  <text x="885" y="425" class="text">OrderMapper and data shaping</text>

  <rect class="box" x="300" y="560" width="300" height="140" fill="#fae8ff" stroke="#a21caf"/>
  <text x="325" y="605" class="label">Repository Layer</text>
  <text x="325" y="633" class="text">Spring Data JPA repositories</text>
  <text x="325" y="655" class="text">UserRepository, ProductRepository...</text>

  <rect class="box" x="680" y="560" width="300" height="140" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="705" y="605" class="label">Entity Layer</text>
  <text x="705" y="633" class="text">User, Role, Product, Cart,</text>
  <text x="705" y="655" class="text">Order, OrderItem, Review</text>

  <rect class="box" x="1060" y="560" width="240" height="140" fill="#f1f5f9" stroke="#475569"/>
  <text x="1085" y="605" class="label">Database</text>
  <text x="1085" y="633" class="text">PostgreSQL</text>
  <text x="1085" y="655" class="text">(H2 in test profile)</text>

  <rect class="box" x="70" y="560" width="190" height="140" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="95" y="605" class="label">DevOps</text>
  <text x="95" y="633" class="text">Docker Compose</text>
  <text x="95" y="655" class="text">GitHub Actions</text>

  <line class="arrow" x1="300" y1="180" x2="360" y2="180"/>
  <line class="arrow" x1="630" y1="180" x2="700" y2="180"/>
  <line class="arrow" x1="980" y1="180" x2="1030" y2="180"/>
  <line class="arrow" x1="840" y1="240" x2="650" y2="330"/>
  <line class="arrow" x1="790" y1="400" x2="860" y2="400"/>
  <line class="arrow" x1="630" y1="470" x2="450" y2="560"/>
  <line class="arrow" x1="630" y1="470" x2="780" y2="560"/>
  <line class="arrow" x1="980" y1="630" x2="1060" y2="630"/>
</svg>
