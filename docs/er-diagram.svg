<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .entityTitle { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .field { font: 13px Arial, sans-serif; fill: #1f2937; }
      .entity { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .line { stroke: #334155; stroke-width: 2; }
      .rel { font: 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="#f8fafc"/>
  <text x="50" y="55" class="title">Mini Marketplace ER Diagram</text>

  <g>
    <rect class="entity" x="80" y="120" width="260" height="180"/>
    <text x="100" y="150" class="entityTitle">users</text>
    <text x="100" y="178" class="field">PK id</text>
    <text x="100" y="200" class="field">username</text>
    <text x="100" y="222" class="field">email</text>
    <text x="100" y="244" class="field">password</text>
    <text x="100" y="266" class="field">full_name, active</text>
  </g>

  <g>
    <rect class="entity" x="430" y="120" width="220" height="140"/>
    <text x="450" y="150" class="entityTitle">roles</text>
    <text x="450" y="178" class="field">PK id</text>
    <text x="450" y="200" class="field">name</text>
  </g>

  <g>
    <rect class="entity" x="760" y="120" width="240" height="140"/>
    <text x="780" y="150" class="entityTitle">user_roles</text>
    <text x="780" y="178" class="field">PK user_id, role_id</text>
    <text x="780" y="200" class="field">FK user_id -> users</text>
    <text x="780" y="222" class="field">FK role_id -> roles</text>
  </g>

  <g>
    <rect class="entity" x="80" y="380" width="280" height="190"/>
    <text x="100" y="410" class="entityTitle">products</text>
    <text x="100" y="438" class="field">PK id</text>
    <text x="100" y="460" class="field">product_name, description</text>
    <text x="100" y="482" class="field">price, stock, category</text>
    <text x="100" y="504" class="field">FK seller_id -> users.id</text>
  </g>

  <g>
    <rect class="entity" x="450" y="380" width="250" height="170"/>
    <text x="470" y="410" class="entityTitle">carts</text>
    <text x="470" y="438" class="field">PK id</text>
    <text x="470" y="460" class="field">FK buyer_id -> users.id</text>
    <text x="470" y="482" class="field">created_at, updated_at</text>
  </g>

  <g>
    <rect class="entity" x="780" y="380" width="290" height="200"/>
    <text x="800" y="410" class="entityTitle">cart_items</text>
    <text x="800" y="438" class="field">PK id</text>
    <text x="800" y="460" class="field">FK cart_id -> carts.id</text>
    <text x="800" y="482" class="field">FK product_id -> products.id</text>
    <text x="800" y="504" class="field">quantity, unit_price, subtotal</text>
    <text x="800" y="526" class="field">added_at</text>
  </g>

  <g>
    <rect class="entity" x="80" y="680" width="280" height="200"/>
    <text x="100" y="710" class="entityTitle">orders</text>
    <text x="100" y="738" class="field">PK id</text>
    <text x="100" y="760" class="field">FK buyer_id -> users.id</text>
    <text x="100" y="782" class="field">status, total_amount</text>
    <text x="100" y="804" class="field">created_at, updated_at</text>
  </g>

  <g>
    <rect class="entity" x="450" y="680" width="300" height="210"/>
    <text x="470" y="710" class="entityTitle">order_items</text>
    <text x="470" y="738" class="field">PK id</text>
    <text x="470" y="760" class="field">FK order_id -> orders.id</text>
    <text x="470" y="782" class="field">FK product_id -> products.id</text>
    <text x="470" y="804" class="field">quantity, unit_price, subtotal</text>
  </g>

  <g>
    <rect class="entity" x="860" y="680" width="290" height="190"/>
    <text x="880" y="710" class="entityTitle">reviews</text>
    <text x="880" y="738" class="field">PK id</text>
    <text x="880" y="760" class="field">FK buyer_id -> users.id</text>
    <text x="880" y="782" class="field">FK product_id -> products.id</text>
    <text x="880" y="804" class="field">rating, comment</text>
  </g>

  <line class="line" x1="340" y1="170" x2="430" y2="170"/>
  <text x="365" y="160" class="rel">M:N via user_roles</text>
  <line class="line" x1="650" y1="170" x2="760" y2="170"/>

  <line class="line" x1="210" y1="300" x2="210" y2="380"/>
  <text x="220" y="350" class="rel">1:M seller->products</text>

  <line class="line" x1="340" y1="220" x2="450" y2="430"/>
  <text x="350" y="340" class="rel">1:1 buyer->cart</text>

  <line class="line" x1="700" y1="460" x2="780" y2="460"/>
  <text x="710" y="450" class="rel">1:M</text>

  <line class="line" x1="360" y1="470" x2="780" y2="500"/>
  <text x="540" y="520" class="rel">1:M product->cart_items</text>

  <line class="line" x1="220" y1="300" x2="220" y2="680"/>
  <text x="230" y="620" class="rel">1:M buyer->orders</text>

  <line class="line" x1="360" y1="770" x2="450" y2="770"/>
  <text x="380" y="760" class="rel">1:M</text>

  <line class="line" x1="360" y1="500" x2="450" y2="810"/>
  <text x="370" y="690" class="rel">1:M product->order_items</text>

  <line class="line" x1="300" y1="570" x2="860" y2="760"/>
  <text x="520" y="700" class="rel">users/products -> reviews</text>
</svg>
